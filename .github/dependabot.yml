version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "production"
    groups:
      production-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "production"
    groups:
      production-dependencies:
        patterns:
          - "*"
